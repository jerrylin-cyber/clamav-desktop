name: CI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  app:
    runs-on: macos-latest
    env:
      APP_NAME: ClamAV Desktop
      APP_ZIP: ClamAV-Desktop-${{ github.ref_name }}-macos.zip
      KEYCHAIN_NAME: build.keychain
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: app/go.mod
          cache-dependency-path: app/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: app/frontend

      - name: Frontend typecheck
        run: npm run typecheck
        working-directory: app/frontend

      - name: Frontend build
        run: npm run build
        working-directory: app/frontend

      - name: Go test
        run: go test ./...

      - name: Go vet
        run: go vet ./...

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Wails build
        run: "$(go env GOPATH)/bin/wails build -skipbindings"

      - name: Detect signing secrets
        id: signing
        env:
          APPLE_DEVELOPER_ID_CERT_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12_BASE64 }}
          APPLE_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
          APPLE_NOTARY_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_NOTARY_KEYCHAIN_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          if [ -n "${APPLE_DEVELOPER_ID_CERT_P12_BASE64}" ] && [ -n "${APPLE_DEVELOPER_ID_CERT_PASSWORD}" ] && [ -n "${APPLE_NOTARY_KEYCHAIN_PASSWORD}" ] && [ -n "${APPLE_API_KEY_ID}" ] && [ -n "${APPLE_API_ISSUER_ID}" ] && [ -n "${APPLE_API_PRIVATE_KEY}" ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
            echo "偵測到完整 Apple 簽署/公證 secrets：將進行簽章與公證。"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "::warning::未設定完整 Apple 簽署/公證 secrets，將發佈未簽署的 build。"
          fi

      - name: Import Developer ID certificate
        if: steps.signing.outputs.enabled == 'true'
        env:
          APPLE_DEVELOPER_ID_CERT_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12_BASE64 }}
          APPLE_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
          APPLE_NOTARY_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_NOTARY_KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "${APPLE_NOTARY_KEYCHAIN_PASSWORD}" "${KEYCHAIN_NAME}"
          security default-keychain -s "${KEYCHAIN_NAME}"
          security unlock-keychain -p "${APPLE_NOTARY_KEYCHAIN_PASSWORD}" "${KEYCHAIN_NAME}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_NAME}"

          echo "${APPLE_DEVELOPER_ID_CERT_P12_BASE64}" | base64 --decode > /tmp/developer-id.p12
          security import /tmp/developer-id.p12 \
            -k "${KEYCHAIN_NAME}" \
            -P "${APPLE_DEVELOPER_ID_CERT_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "${APPLE_NOTARY_KEYCHAIN_PASSWORD}" "${KEYCHAIN_NAME}"

      - name: Codesign app bundle
        if: steps.signing.outputs.enabled == 'true'
        env:
          APPLE_NOTARY_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_NOTARY_KEYCHAIN_PASSWORD }}
        run: |
          SIGN_IDENTITY=$(security find-identity -v -p codesigning "${KEYCHAIN_NAME}" | awk '/Developer ID Application/{print $2; exit}')
          if [ -z "${SIGN_IDENTITY}" ]; then
            echo "找不到 Developer ID Application 簽章身份" >&2
            security find-identity -v -p codesigning "${KEYCHAIN_NAME}" || true
            exit 1
          fi

          echo "Using signing identity hash: ${SIGN_IDENTITY}"
          codesign --force --deep --options runtime --timestamp \
            --sign "${SIGN_IDENTITY}" \
            "build/bin/${APP_NAME}.app"

      - name: Verify code signature
        if: steps.signing.outputs.enabled == 'true'
        run: |
          codesign --verify --deep --strict --verbose=2 "build/bin/${APP_NAME}.app"
          codesign -dv --verbose=4 "build/bin/${APP_NAME}.app"

      - name: Package app bundle
        run: ditto -c -k --sequesterRsrc --keepParent "build/bin/${APP_NAME}.app" "build/bin/${APP_ZIP}"

      - name: Notarize app zip
        if: steps.signing.outputs.enabled == 'true'
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          API_KEY_FILE="/tmp/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "${APPLE_API_PRIVATE_KEY}" > "${API_KEY_FILE}"

          xcrun notarytool submit "build/bin/${APP_ZIP}" \
            --key "${API_KEY_FILE}" \
            --key-id "${APPLE_API_KEY_ID}" \
            --issuer "${APPLE_API_ISSUER_ID}" \
            --wait

      - name: Staple notarization ticket
        if: steps.signing.outputs.enabled == 'true'
        run: |
          xcrun stapler staple "build/bin/${APP_NAME}.app"
          spctl -a -vvv --type execute "build/bin/${APP_NAME}.app"

      - name: Repackage stapled app bundle
        if: steps.signing.outputs.enabled == 'true'
        run: ditto -c -k --sequesterRsrc --keepParent "build/bin/${APP_NAME}.app" "build/bin/${APP_ZIP}"

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: app/build/bin/${{ env.APP_ZIP }}
