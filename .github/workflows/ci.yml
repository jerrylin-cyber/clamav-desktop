name: CI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  app:
    runs-on: macos-latest
    env:
      APP_NAME: ClamAV Desktop
      APP_ZIP: ClamAV-Desktop-${{ github.ref_name }}-macos.zip
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: app/go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: app/frontend

      - name: Frontend typecheck
        run: npm run typecheck
        working-directory: app/frontend

      - name: Frontend build
        run: npm run build
        working-directory: app/frontend

      - name: Go test
        run: go test ./...

      - name: Go vet
        run: go vet ./...

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Wails build
        run: "$(go env GOPATH)/bin/wails build -skipbindings"

      - name: Package app bundle
        run: ditto -c -k --sequesterRsrc --keepParent "build/bin/${APP_NAME}.app" "build/bin/${APP_ZIP}"

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: app/build/bin/${{ env.APP_ZIP }}
